<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <title>アンケートアプリ</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="container">

    <h1>📋 アンケートアプリ</h1>

    <p class="sub-title">
        メニューを選択してください
    </p>

    <div class="menu">

        <a th:href="@{/create}" class="card">
            <span class="icon">📝</span>
            <h2>アンケート作成</h2>
            <p>新しいアンケートを作成します。</p>
        </a>

        <a th:href="@{/answer}" class="card">
            <span class="icon">✍️</span>
            <h2>アンケート回答</h2>
            <p>アンケートに回答します。</p>
        </a>

        <a th:href="@{/result}" class="card">
            <span class="icon">📊</span>
            <h2>結果確認</h2>
            <p>回答結果を確認します。</p>
        </a>

    </div>

</div>

</body>
</html>
