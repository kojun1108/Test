<form th:action="@{/purchase}"
      th:object="${form}"
      method="post">

    <div>
        会員コード
        <input type="text" th:field="*{memberCode}">
    </div>

    <button type="submit" name="search">
        検索
    </button>

    <div th:if="*{memberDto != null}">

        <p>
            会員ID :
            <span th:text="*{memberDto.memberId}"></span>
        </p>

        <p>
            氏名 :
            <span th:text="*{memberDto.name}"></span>
        </p>

        <!-- confirm用に保持 -->
        <input type="hidden"
               th:field="*{memberDto.memberId}">

        <input type="hidden"
               th:field="*{memberDto.name}">

    </div>

    <div>
        支払い方法

        <select th:field="*{paymentMethod}">
            <option value="">選択してください</option>
            <option value="1">クレジットカード</option>
            <option value="2">銀行振込</option>
            <option value="3">コンビニ払い</option>
        </select>
    </div>

    <button type="submit" name="confirm">
        確認
    </button>

</form>
