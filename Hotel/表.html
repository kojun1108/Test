<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ホテル一覧</title>

<style>
body{
    font-family: sans-serif;
    background:#f5f5f5;
}

.hotel-list{
    width:900px;
    margin:30px auto;
    border-radius:8px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.hotel-header{
    background:#0d5a9d;
    color:#fff;
    padding:15px 20px;
    font-size:24px;
    font-weight:bold;
    display:flex;
    gap:40px;
}

.hotel-row{
    display:flex;
    align-items:center;
    padding:20px;
    background:#fff;
    border-bottom:1px solid #ddd;
}

.hotel-row:last-child{
    border-bottom:none;
}

.hotel-icon{
    width:60px;
    text-align:center;
    font-size:40px;
    color:#333;
}

.hotel-info{
    flex:1;
    margin-left:20px;
}

.hotel-code{
    font-size:14px;
    color:#666;
}

.hotel-area{
    font-size:16px;
    color:#666;
}

.hotel-name{
    font-size:34px;
    font-weight:bold;
    color:#333;
}

.hotel-date{
    width:150px;
    text-align:center;
    color:#666;
}

.hotel-price{
    width:150px;
    text-align:right;
    font-size:40px;
    font-weight:bold;
    color:#111;
}

.soldout{
    opacity:.4;
    position:relative;
}

.soldout::after{
    content:"Sold Out";
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    color:#d60000;
    font-size:40px;
    font-weight:bold;
    opacity:1;
}
</style>
</head>

<body>

<div class="hotel-list">

    <div class="hotel-header">
        <span>ホテル</span>
        <span>2026/06/02</span>
    </div>

    <div class="hotel-row">
        <div class="hotel-icon">🏨</div>

        <div class="hotel-info">
            <div class="hotel-code">FK0001</div>
            <div class="hotel-area">福岡</div>
            <div class="hotel-name">福岡プリンスホテル</div>
        </div>

        <div class="hotel-date">
            5月2日<br>
            2026/06/02
        </div>

        <div class="hotel-price">
            15,000円
        </div>
    </div>

    <div class="hotel-row soldout">
        <div class="hotel-icon">🏨</div>

        <div class="hotel-info">
            <div class="hotel-code">FK0002</div>
            <div class="hotel-area">福岡</div>
            <div class="hotel-name">アサトンタワーホテル博多</div>
        </div>

        <div class="hotel-date">
            5月2日<br>
            2026/06/02
        </div>

        <div class="hotel-price">
            15,000円
        </div>
    </div>

</div>

</body>
</html>
