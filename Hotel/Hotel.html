<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>ホテル検索</title>

<link rel="stylesheet"
      th:href="@{/css/hotel.css}">
</head>

<body>

<div class="container">

    <h1 class="page-title">
        ホテル検索
    </h1>

    <!-- 検索フォーム -->

    <form th:action="@{/hotel/search}"
          method="get"
          th:object="${searchForm}"
          class="search-box">

            <input type="date"
                   th:field="*{stayDate}">

            <div class="error"
                 th:if="${#fields.hasErrors('stayDate')}"
                 th:errors="*{stayDate}">
            </div>

            <select th:field="*{city}">

                <option value="">
                    都市名
                </option>

                <option value="福岡">
                    福岡
                </option>

                <option value="博多">
                    博多
                </option>

                <option value="東京">
                    東京
                </option>

            </select>

            <div class="error"
                 th:if="${#fields.hasErrors('city')}"
                 th:errors="*{city}">
            </div>

            <select th:field="*{maxPrice}">
            <option>料金</option>
            <option>10,000円以下</option>
            <option>15,000円以下</option>
            <option>20,000円以下</option>
            </select>

      <button type="submit"
                class="search-btn">

            検索

        </button>

    </form>

    <!-- 一覧ヘッダ -->

    <div class="header">

        <div>
            ホテル名
        </div>

        <div>
            料金
        </div>

    </div>

    <!-- 一覧 -->

    <div class="hotel-list">

        <div th:each="hotel : ${hotelList}"
             class="hotel-row"
             th:classappend="${hotel.stock == 0} ? ' soldout-row'">

            <div class="hotel-left">

                <div class="city"
                     th:text="${hotel.city}">
                </div>

                <div class="hotel-name">

                    <a th:if="${hotel.stock > 0}"
                       th:href="@{/hotel/detail/{id}(id=${hotel.hotelId})}"
                       th:text="${hotel.hotelName}">
                    </a>

                    <span th:if="${hotel.stock == 0}"
                          class="disabled-name"
                          th:text="${hotel.hotelName}">
                    </span>

                </div>

                <div class="hotel-id"
                     th:text="${hotel.hotelId}">
                </div>

            </div>

            <div class="hotel-right">

                <div class="price"
                     th:text="${#numbers.formatInteger(hotel.price,3,'COMMA')} + '円'">
                </div>

            </div>

            </div>

            <div class="soldout"
                 th:if="${hotel.stock == 0}">
            </div>

        </div>

    </div>

    <!-- 0件 -->

    <div class="no-data"
         th:if="${#lists.isEmpty(hotelList)}">

        該当するホテルはありません。

    </div>

    <!-- ページング -->

    <div class="pager"
         th:if="${totalPages > 1}">

        <!-- 前へ -->

        <form th:if="${currentPage > 0}"
              th:action="@{/hotel/search}"
              method="get">

            <input type="hidden"
                   name="stayDate"
                   th:value="${searchForm.stayDate}">

            <input type="hidden"
                   name="city"
                   th:value="${searchForm.city}">

            <input type="hidden"
                   name="maxPrice"
                   th:value="${searchForm.maxPrice}">

            <input type="hidden"
                   name="page"
                   th:value="${currentPage - 1}">

            <button type="submit">
                ＜
            </button>

        </form>

        <!-- ページ番号 -->

        <span th:each="i : ${#numbers.sequence(0,totalPages - 1)}">

            <form th:action="@{/hotel/search}"
                  method="get">

                <input type="hidden"
                       name="stayDate"
                       th:value="${searchForm.stayDate}">

                <input type="hidden"
                       name="city"
                       th:value="${searchForm.city}">

                <input type="hidden"
                       name="maxPrice"
                       th:value="${searchForm.maxPrice}">

                <input type="hidden"
                       name="page"
                       th:value="${i}">

                <button type="submit"
                        th:text="${i + 1}"
                        th:classappend="${i == currentPage} ? ' active'">
                </button>

            </form>

        </span>

        <!-- 次へ -->

        <form th:if="${currentPage < totalPages - 1}"
              th:action="@{/hotel/search}"
              method="get">

            <input type="hidden"
                   name="stayDate"
                   th:value="${searchForm.stayDate}">

            <input type="hidden"
                   name="city"
                   th:value="${searchForm.city}">

            <input type="hidden"
                   name="maxPrice"
                   th:value="${searchForm.maxPrice}">

            <input type="hidden"
                   name="page"
                   th:value="${currentPage + 1}">

            <button type="submit">
                ＞
            </button>

        </form>

    </div>

</div>

</body>
</html>
