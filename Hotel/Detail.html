<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>ホテル詳細</title>
<link rel="stylesheet" th:href="@{/css/hotel-detail.css}">
</head>

<body>

<div class="container">

    <h2 class="page-title">ホテル詳細</h2>

    <!-- 検索エリア -->

    <form th:action="@{/hotel}"
          method="get"
          th:object="${searchForm}"
          class="search-area">

        <input type="date"
               th:field="*{stayDate}"
               placeholder="宿泊日">

        <select th:field="*{city}">
            <option value="">都市名</option>
            <option value="福岡">福岡</option>
            <option value="東京">東京</option>
        </select>

        <input type="number"
               th:field="*{maxPrice}"
               placeholder="料金">

        <button type="submit">
            検索
        </button>

    </form>

    <!-- 詳細カード -->

    <div class="detail-card">

        <div class="detail-header">

            <div class="stay-info">

                🌴

                <span>
                    宿泊日：
                </span>

                <span th:text="${hotel.stayDate}">
                </span>

            </div>

            <div class="stock">

                在庫：

                <span th:text="${hotel.stock}">
                </span>

            </div>

        </div>

        <div class="detail-body">

            <!-- 左側 -->

            <div class="hotel-info">

                <div class="city"
                     th:text="${hotel.city}">
                </div>

                <div class="hotel-name"
                     th:text="${hotel.hotelName}">
                </div>

                <div class="hotel-id"
                     th:text="${hotel.hotelId}">
                </div>

                <div class="grade">

                    Grade

                    <span th:text="${hotel.grade}">
                    </span>

                </div>

            </div>

            <!-- 右側 -->

            <div class="purchase-area">

                <div class="error-message"
                     th:if="${errorMessage}"
                     th:text="${errorMessage}">
                </div>

                <form th:action="@{/cart/add}"
                      method="post">

                    <input type="hidden"
                           name="hotelId"
                           th:value="${hotel.hotelId}">

                    <div class="quantity-row">

                        <label>数量</label>

                        <input type="number"
                               name="quantity"
                               min="1"
                               value="1"
                               th:max="${hotel.stock}">
                    </div>

                    <div class="price"
                         th:text="${#numbers.formatInteger(hotel.price,3,'COMMA')} + '円'">
                    </div>

                    <button class="cart-btn"
                            type="submit"
                            th:disabled="${hotel.stock == 0}">
                        カートへ
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
