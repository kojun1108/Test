<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>ホテル詳細</title>

<link rel="stylesheet"
      th:href="@{/css/hotel-detail.css}">
</head>

<body>

<div class="container">

    <h1 class="page-title">
        ホテル詳細
    </h1>

    <!-- 検索フォーム -->

    <form th:action="@{/hotel/search}"
          method="get"
          th:object="${searchForm}"
          class="search-box">

        <input type="date"
               th:field="*{stayDate}">
            
           <div class="error"

                 th:if="${#fields.hasErrors('stayDate')}"

                 th:errors="*{stayDate}">

            </div>

        <select th:field="*{city}">
            <option value="">都市名</option>
            <option value="福岡">福岡</option>
            <option value="博多">博多</option>
            <option value="東京">東京</option>
        </select>
        
          <div class="error"

                 th:if="${#fields.hasErrors('city')}"

                 th:errors="*{city}">

            </div>

        <input type="number"
               th:field="*{maxPrice}"
               placeholder="料金上限">

        <button type="submit">
            検索
        </button>

    </form>

    <div class="detail-card">

        <div class="detail-header">

            <div>
                宿泊日：
                <span th:text="${hotel.stayDate}">
                </span>
            </div>

            <div>
                在庫：
                <span th:text="${hotel.stock}">
                </span>
            </div>

        </div>

        <div class="detail-body">

            <div class="left-area">

                <div class="city"
                     th:text="${hotel.city}">
                </div>

                <div class="hotel-name"
                     th:text="${hotel.hotelName}">
                </div>

                <div class="hotel-id"
                     th:text="${hotel.hotelId}">
                </div>

                <div class="grade">

                    Grade

                    <span th:text="${hotel.grade}">
                    </span>

                </div>

            </div>

            <div class="right-area">

                <div class="error-message"
                     th:if="${errorMessage}"
                     th:text="${errorMessage}">
                </div>

<form th:action="@{/cart/add}"
      method="post"
      th:object="${cartForm}">

    <input type="hidden"
           th:field="*{hotelId}">

    <div class="quantity-row">

        <label>数量</label>

        <input type="number"
               th:field="*{quantity}"
               min="1"
               th:max="${hotel.stock}">

    </div>

    <div class="error-message"
         th:if="${#fields.hasErrors('quantity')}"
         th:errors="*{quantity}">
    </div>

    <div class="price"
         th:text="${#numbers.formatInteger(hotel.price,3,'COMMA')} + '円'">
    </div>

    <button type="submit"
            class="cart-btn"
            th:disabled="${hotel.stock == 0}">
        カートへ
    </button>

</form>

            </div>

        </div>

    </div>

</div>

</body>
</html>p
