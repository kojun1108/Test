<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>ホテル詳細</title>

<link rel="stylesheet"
      th:href="@{/css/style.css}">
</head>

<body>

<div class="detail-container">

    <h1>ホテル詳細</h1>

    <table>

        <tr>
            <th>ID</th>
            <td th:text="${hotel.hotelId}"></td>
        </tr>

        <tr>
            <th>ホテル名</th>
            <td th:text="${hotel.hotelName}"></td>
        </tr>

        <tr>
            <th>都市</th>
            <td th:text="${hotel.city}"></td>
        </tr>

        <tr>
            <th>料金</th>
            <td th:text="${hotel.price} + '円'"></td>
        </tr>

        <tr>
            <th>在庫</th>
            <td th:text="${hotel.stock}"></td>
        </tr>

    </table>

    <br>

    <a th:href="@{/hotel}">
        一覧へ戻る
    </a>

</div>

</body>
</html>
